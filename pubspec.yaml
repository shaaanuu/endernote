name: endernote
description: "Your versatile note-taking companion. Craft, create, and unleash your ideas with ease!"

version: 4.2.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.22.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.0.0
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.1
  bloc: ^9.0.0
  path: ^1.9.0
  flutter_speed_dial: ^7.0.0
  iconsax_linear: ^1.1.0
  shared_preferences: ^2.5.3
  file_picker: ^11.0.2
  permission_handler: ^12.0.1
  flutter_markdown_plus: ^1.0.7
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  isar_community_generator: ^3.3.2
  build_runner: ^2.13.1

flutter:
  uses-material-design: true

  assets:
    - lib/assets/

  fonts:
    - family: SourceSans3Regular
      fonts:
      - asset: lib/assets/SourceSans3-Regular.ttf
    - family: SourceSans3Light
      fonts:
        - asset: lib/assets/SourceSans3-Light.ttf
    - family: SourceSans3Bold
      fonts:
        - asset: lib/assets/SourceSans3-Bold.ttf
    - family: WorkSans
      fonts:
        - asset: lib/assets/WorkSans.ttf
    - family: RobotoSlab
      fonts:
        - asset: lib/assets/RobotoSlab.ttf
    - family: JetBrainsMono
      fonts:
        - asset: lib/assets/JetBrainsMono.ttf
